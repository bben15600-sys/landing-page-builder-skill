<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LIVNAT logo">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#F0E5D2"/>
      <stop offset="100%" stop-color="#E0D2BC"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8956A"/>
      <stop offset="50%" stop-color="#C9A574"/>
      <stop offset="100%" stop-color="#A8855A"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bg)"/>
  <!-- Outer gold ring -->
  <circle cx="200" cy="200" r="172" fill="none" stroke="url(#gold)" stroke-width="2.2"/>
  <circle cx="200" cy="200" r="166" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.7"/>
  <!-- Blue flower top -->
  <g transform="translate(200, 95)">
    <g fill="#9CB5CC" stroke="#7A95B0" stroke-width="0.8">
      <ellipse cx="0" cy="-14" rx="9" ry="13"/>
      <ellipse cx="13" cy="-4" rx="9" ry="13" transform="rotate(72 13 -4)"/>
      <ellipse cx="8" cy="12" rx="9" ry="13" transform="rotate(144 8 12)"/>
      <ellipse cx="-8" cy="12" rx="9" ry="13" transform="rotate(216 -8 12)"/>
      <ellipse cx="-13" cy="-4" rx="9" ry="13" transform="rotate(288 -13 -4)"/>
    </g>
    <circle cx="0" cy="0" r="5.5" fill="#B8956A"/>
    <!-- small leaf -->
    <path d="M 16 6 Q 25 8 26 18 Q 22 14 16 12 Z" fill="#9CB5CC" opacity="0.85"/>
  </g>
  <!-- LIVNAT wordmark -->
  <text x="200" y="225" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="56" font-weight="400"
    fill="url(#gold)" letter-spacing="9"
    font-style="italic">LIVNAT</text>
  <!-- Decorative line -->
  <line x1="120" y1="248" x2="280" y2="248" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- Hebrew tagline -->
  <text x="200" y="278" text-anchor="middle"
    font-family="'Heebo', 'Arial Hebrew', sans-serif"
    font-size="16" font-weight="500"
    fill="#7A95B0" letter-spacing="1.5">בואי לחוות את השינוי בעורך</text>
</svg>
